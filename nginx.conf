server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Enrutado SPA: cualquier ruta desconocida cae en index.html
    # (necesario para React Router en recargas de rutas profundas).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresiva para los assets con hash en el nombre.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # El HTML no se cachea para servir siempre la última versión.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
